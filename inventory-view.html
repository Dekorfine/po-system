<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存查询(只读)· JANEDECOR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#f7f7f4;--card:#fff;--border:#e7e5e0;--text:#1c1a17;--sec:#6b6660;--ter:#9c9690;--accent:#2563eb;--ok:#16a34a;--warn:#f59e0b;--danger:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:14px;font-size:14px;}
  .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
  h1{font-size:17px;display:flex;align-items:center;gap:8px;}
  .badge-readonly{font-size:11px;font-weight:600;color:var(--sec);background:rgba(120,113,108,.14);padding:3px 9px;border-radius:10px;}
  .tip{font-size:12px;color:var(--sec);background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.2);border-radius:8px;padding:8px 12px;margin-bottom:12px;line-height:1.6;}
  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  input[type=text]{flex:1;min-width:200px;padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:18px;}
  .chip{padding:6px 12px;font-size:12px;border:1px solid var(--border);border-radius:16px;background:var(--card);color:var(--sec);cursor:pointer;}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:6px;}
  .imgwrap{position:relative;width:100%;aspect-ratio:1/1;background:var(--bg);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .imgwrap img{width:100%;height:100%;object-fit:cover;}
  .stockbadge{position:absolute;top:6px;left:6px;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
  .name{font-size:13px;font-weight:600;line-height:1.3;min-height:34px;overflow:hidden;}
  .sku{font-size:10.5px;color:var(--ter);font-family:monospace;}
  .meta{font-size:10.5px;color:var(--sec);display:flex;justify-content:space-between;}
  .stale{font-size:10.5px;color:var(--danger);font-weight:700;}
  .empty{padding:48px;text-align:center;color:var(--ter);}
  .count{font-size:12px;color:var(--sec);margin-bottom:8px;}
</style>
</head>
<body>
  <div class="top">
    <h1>📦 库存查询 <span class="badge-readonly">只读 · 实时</span></h1>
  </div>
  <div class="tip" id="tipBox">查询某个 SKU/产品是否还有库存。<b>库存 &gt; 0 的产品请勿下架</b>,可优先安排。数据实时同步跟单库存仓库。</div>
  <div class="controls">
    <input type="text" id="q" placeholder="🔍 SKU / 产品名 / 供应商 / 平台SKU">
    <span class="chip on" data-f="all" onclick="setF('all')">全部</span>
    <span class="chip" data-f="instock" onclick="setF('instock')">有货</span>
    <span class="chip" data-f="low" onclick="setF('low')">低库存</span>
    <span class="chip" data-f="out" onclick="setF('out')">缺货</span>
  </div>
  <div class="count" id="count"></div>
  <div id="list"><div class="empty">加载中…</div></div>

<script>
const SB = supabase.createClient('https://pyfmuknvjqfwcqvbrsvw.supabase.co','sb_publishable_dFjk1WN_Hc0Te6IhXZysZg_SXvKQU4C');
let ALL=[], F='all', Q='';
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function ageDays(p){ if(!p.stock_in_at)return null; return Math.floor((Date.now()-new Date(p.stock_in_at).getTime())/86400000); }

async function load(){
  try{
    const { data, error } = await SB.from('products')
      .select('id,sku,name_cn,name_en,image_url,stock_qty,stock_alert_threshold,default_supplier,platform_skus,stock_in_at')
      .eq('is_inventory_item',true).is('deleted_at',null)
      .order('stock_qty',{ascending:true});
    if(error)throw error;
    ALL=data||[]; render();
  }catch(e){ document.getElementById('list').innerHTML='<div class="empty">加载失败:'+esc(e.message||e)+'</div>'; }
}
function setF(f){ F=f; document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f===f)); render(); }
document.getElementById('q').addEventListener('input',e=>{ Q=e.target.value.trim().toLowerCase(); render(); });

function render(){
  let list=ALL.slice();
  if(Q) list=list.filter(p=>{
    if((p.sku||'').toLowerCase().includes(Q))return true;
    if((p.name_cn||'').toLowerCase().includes(Q))return true;
    if((p.name_en||'').toLowerCase().includes(Q))return true;
    if((p.default_supplier||'').toLowerCase().includes(Q))return true;
    return Array.isArray(p.platform_skus)&&p.platform_skus.some(ps=>(ps.sku||'').toLowerCase().includes(Q));
  });
  if(F==='instock')list=list.filter(p=>Number(p.stock_qty||0)>0);
  else if(F==='out')list=list.filter(p=>Number(p.stock_qty||0)<=0);
  else if(F==='low')list=list.filter(p=>{const s=Number(p.stock_qty||0);return s>0&&s<=(p.stock_alert_threshold||5);});

  document.getElementById('count').textContent='共 '+list.length+' 款';
  const el=document.getElementById('list');
  if(list.length===0){ el.innerHTML='<div class="empty">📦 没有匹配的库存</div>'; return; }
  el.innerHTML='<div class="grid">'+list.map(p=>{
    const s=Number(p.stock_qty||0), thr=Number(p.stock_alert_threshold||5);
    let col=getComputedStyle(document.documentElement).getPropertyValue('--ok'), txt='充足';
    if(s<=0){col='#dc2626';txt='缺货';} else if(s<=thr){col='#f59e0b';txt='低';}
    const age=ageDays(p);
    const plat=Array.isArray(p.platform_skus)?p.platform_skus:[];
    return `<div class="card">
      <div class="imgwrap">
        ${p.image_url?`<img src="${esc(p.image_url)}" loading="lazy">`:'<span style="font-size:30px;color:#9c9690;">📦</span>'}
        <span class="stockbadge" style="background:${col};">${txt} ${s}</span>
      </div>
      <div class="name">${esc(p.name_cn||'(无名)')}</div>
      <div class="sku">${esc(p.sku||'')}</div>
      ${age!=null?`<div class="${s>0&&age>=90?'stale':'sku'}">${s>0&&age>=90?'🐢 ':'库龄 '}${age}天</div>`:''}
      <div class="meta"><span>${p.default_supplier?'🏭 '+esc(p.default_supplier):''}</span><span>${plat.length?'🔗'+plat.length:''}</span></div>
    </div>`;
  }).join('')+'</div>';
}
load();
setInterval(load, 120000); // 每2分钟刷新一次,保持实时
</script>
</body>
</html>
